<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVER // SELECTOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0905;
    --surface: #111009;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ead8;
    --text-muted: rgba(240,234,216,0.38);
    --text-dim: rgba(240,234,216,0.18);
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain & Scanlines */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.6;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 999;
  }

  .page { max-width: 1100px; margin: 0 auto; padding: 0 2rem 4rem; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2rem 0 1.5rem; border-bottom: 1px solid var(--border);
    margin-bottom: 3rem; animation: fadeUp 0.8s ease forwards;
  }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); letter-spacing: 0.18em; color: var(--gold); }
  .header-sub { font-size: 0.65rem; letter-spacing: 0.22em; color: var(--text-muted); text-transform: uppercase; }

  /* Main Layout */
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 3rem; animation: fadeUp 0.8s 0.2s ease forwards; }
  @media (max-width: 800px) { .main { grid-template-columns: 1fr; } .panel { order: -1; } }

  /* Canvas */
  .canvas-outer {
    position: relative; width: 100%; aspect-ratio: 1;
    max-width: 540px; margin: 0 auto;
  }
  .canvas-frame { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
  .canvas-frame::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.65) 100%);
    pointer-events: none; z-index: 2;
  }

  /* Layers */
  .bg-layer {
    position: absolute; inset: 0; background-size: cover; background-position: center;
    transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .bg-red { background-color: #1a0808; background-image: url('red.jpg'), linear-gradient(135deg,#8B1A1A 0%,#4a0000 60%,#1a0505 100%); }
  .bg-black { background-color: #050505; background-image: url('black.jpg'), linear-gradient(145deg,#0f0f0f 0%,#050505 50%,#000 100%); }
  .bg-textile { background-color: #231c10; background-image: url('textile.jpg'), repeating-linear-gradient(45deg,#231c10 0px,#231c10 4px,#2e2515 4px,#2e2515 8px); }

  .char-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  
  /* FIXED Character Size & Position */
  .char-slot {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 58%; height: 78%;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center bottom;
    transition: opacity 0.35s ease;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 0 60px rgba(201,168,76,0.08) inset;
  }

  .char-og { background-image: url('og.png'); }
  .char-vaughn { background-image: url('vaughn.png'); }
  .char-text { background-image: url('text.png'); }
  .char-opps { background-image: url('opps.png'); }

  .char-slot::after {
    content: attr(id); position: absolute; bottom: 8px;
    font-size: 9px; letter-spacing: 0.15em; color: rgba(240,234,216,0.25);
  }

  .hidden { opacity: 0; }

  /* Navigation & UI Elements */
  .nav-arrows { display: flex; align-items: center; justify-content: space-between; margin-top: 1.25rem; }
  .nav-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    cursor: pointer; font-family: 'DM Mono', monospace; font-size: 0.65rem;
    padding: 0.55rem 1.2rem; transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
  .dots { display: flex; gap: 6px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-hover); cursor: pointer; }
  .dot.active { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .combo-badge { margin-top: 1.25rem; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
  .pill-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    cursor: pointer; background: none; border: 1px solid var(--border);
    color: var(--text-muted); font-family: 'DM Mono', monospace; font-size: 0.62rem;
    padding: 0.45rem 0.9rem; transition: all 0.18s;
  }
  .pill.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

  /* Saved Picks */
  .saves-block { border-top: 1px solid var(--border); padding-top: 1.25rem; margin-top: 2rem; }
  .save-btn {
    cursor: pointer; background: none; border: 1px solid var(--border);
    color: var(--text-muted); width: 100%; padding: 0.6rem; transition: 0.2s;
  }
  .save-btn:hover { border-color: var(--gold); color: var(--gold); }
  .saved-row {
    display: flex; align-items: center; padding: 0.5rem;
    border: 1px solid var(--border); margin-top: 5px; font-size: 0.65rem;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .flash { animation: flashGold 0.6s ease; }
  @keyframes flashGold { 0% { box-shadow: 0 0 0 0 rgba(201,168,76,0); } 30% { box-shadow: 0 0 0 6px rgba(201,168,76,0.2); } 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); } }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <div>
      <div class="header-title">Cover Selector</div>
      <div class="header-sub">Album Art — Final Pick Tool</div>
    </div>
  </header>

  <div class="main">
    <div class="canvas-section">
      <div class="canvas-outer">
        <div class="canvas-frame" id="canvasFrame">
          <div class="bg-layer bg-red" id="bg-red"></div>
          <div class="bg-layer bg-black" id="bg-black" style="opacity:0"></div>
          <div class="bg-layer bg-textile" id="bg-textile" style="opacity:0"></div>

          <div class="char-layer">
            <div class="char-slot char-og" id="char-og"></div>
            <div class="char-slot char-vaughn hidden" id="char-vaughn"></div>
            <div class="char-slot char-text hidden" id="char-text"></div>
            <div class="char-slot char-opps hidden" id="char-opps"></div>
          </div>
        </div>
      </div>

      <div class="nav-arrows">
        <button class="nav-btn" id="bgPrev">PREV BG</button>
        <div class="dots" id="bgDots"></div>
        <button class="nav-btn" id="bgNext">NEXT BG</button>
      </div>
      <div class="combo-badge">CURRENT: <span id="comboText"></span></div>
    </div>

    <div class="panel">
      <div class="ctrl-block">
        <p style
